<!DOCTYPE html>
<html>
  <body>
    <a href="javascript:(async()=>{let i=document.createElement('input');i.type='file';i.onchange=async()=>{let f=i.files[0];if(!f)return;let d=new FormData();d.append('file',f);try{let r=await fetch('https://0x0.st',{method:'POST',body:d});let t=await r.text();prompt('Uploaded to 0x0.st',t.trim());}catch(e){alert('Upload failed: '+e.message);}};i.click();})()">Upload to 0x0.st</a>
  </body>
</html>
