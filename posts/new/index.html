<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload to 0x0.st</title>
</head>
<body>
  <h2>Upload a File to 0x0.st</h2>
  <input type="file" id="fileInput">
  <button onclick="upload()">Upload</button>
  <p id="result"></p>

  <script>
    async function upload() {
      const fileInput = document.getElementById('fileInput');
      const resultEl = document.getElementById('result');

      if (!fileInput.files.length) {
        resultEl.textContent = "Please select a file.";
        return;
      }

      const file = fileInput.files[0];
      const formData = new FormData();
      formData.append("file", file);

      try {
        const response = await fetch("https://0x0.st", {
          method: "POST",
          body: formData
        });

        const text = await response.text();
        resultEl.innerHTML = `<a href="${text.trim()}" target="_blank">${text.trim()}</a>`;
      } catch (error) {
        resultEl.textContent = "Upload failed: " + error.message;
      }
    }
  </script>
</body>
</html>
